<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profit Maker POS</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(120deg, #0f172a 0%, #1f2937 40%, #f97316 100%);
        color: #ffedd5;
        font-family: Inter, system-ui, sans-serif;
      }
      .splash {
        text-align: center;
        border: 2px solid rgba(245, 158, 11, 0.8);
        border-radius: 24px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 0 20px rgba(252, 211, 77, 0.5);
      }
      .title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        color: #f59e0b;
      }
      .subtitle {
        font-size: 1rem;
        opacity: 0.9;
        color: #fb923c;
      }
      .loader {
        margin-top: 1rem;
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: rgba(255, 255, 255, 1);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="title">Profit Maker POS</div>
      <div class="subtitle">Starting up... please wait</div>
      <div class="loader"></div>
    </div>
  </body>
</html>
